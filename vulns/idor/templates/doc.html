<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Document #{{.Doc.ID}} — {{.Doc.Title}}</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  .eyebrow {
    font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, monospace;
  }
  h1 {
    font-size: clamp(1.75rem, 4vw, 2.5rem);
    margin-bottom: 1.5rem;
  }
  article {
    padding: 1.75rem 2rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 1rem;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
  <div class="container">
    <a class="back" href="/idor/">&lsaquo; My documents</a>
    {{if .Solved}}<div class="solved-banner">Challenge completed.</div>{{end}}
    <p class="eyebrow">Document #{{.Doc.ID}}</p>
    <h1>{{.Doc.Title}}</h1>
    <article>{{.Doc.Body}}</article>
  </div>
</body>
</html>
